<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEC Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #002147; --gold: #C5A059; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); overflow-x: hidden; }
        .sidebar { width: 260px; background: var(--primary); color: white; position: fixed; height: 100vh; }
        .sidebar-brand { padding: 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--gold); color: var(--primary); font-weight: bold; }
        .main { margin-left: 260px; padding: 40px; }
        .card { background: var(--white); border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 30px; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gold { background: var(--gold); color: var(--primary); }
        .stats-card { text-align: center; padding: 20px; border-radius: 10px; color: white; }
        .login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .loader { display:none; position:fixed; top:20px; right:20px; background:#333; color:white; padding:10px 20px; border-radius:50px; z-index:2000; }
    </style>
</head>
<body>

    <div id="loader" class="loader"><i class="fas fa-spinner fa-spin"></i> Processing...</div>

    <div id="loginSection" class="login-overlay">
        <div class="card" style="width:350px; text-align:center;">
            <h2 style="color:var(--primary)">UEC LOGIN</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()" class="btn btn-primary" style="width:100%; margin-top:15px;">Access System</button>
        </div>
    </div>

    <div id="appSection" style="display:none;">
        <aside class="sidebar">
            <div class="sidebar-brand"><h2>EAST CAPITAL</h2></div>
            <ul style="list-style:none; padding:0;">
                <li id="n-adm" class="nav-item" onclick="showPage('admission')"><i class="fas fa-user-plus"></i> Admission</li>
                <li id="n-fin" class="nav-item" onclick="showPage('finance')"><i class="fas fa-wallet"></i> Finance</li>
                <li id="n-id" class="nav-item" onclick="showPage('idcard')"><i class="fas fa-id-card"></i> ID Management</li>
                <li id="n-rep" class="nav-item" onclick="showPage('reports')"><i class="fas fa-chart-pie"></i> Admin Reports</li>
                <li class="nav-item" onclick="logout()" style="margin-top:50px;"><i class="fas fa-sign-out-alt"></i> Logout</li>
            </ul>
        </aside>

        <main class="main">
            <div id="p-admission" class="page" style="display:none;">
                <div class="card">
                    <h3>New Student Registration</h3>
                    <div class="grid">
                        <input type="text" id="a_id" placeholder="Student ID">
                        <input type="text" id="a_name" placeholder="Full Name">
                        <select id="a_fac"><option>Computer Science</option><option>Engineering</option></select>
                        <input type="text" id="a_phone" placeholder="Phone Number">
                        <input type="email" id="a_mail" placeholder="Email Address">
                        <input type="text" id="a_nid" placeholder="National ID">
                    </div>
                    <input type="text" id="a_photo" placeholder="Photo URL">
                    <div style="display:flex; gap:10px; margin-top:20px;">
                        <button onclick="saveStudent()" class="btn btn-primary">Save Student</button>
                        <button onclick="clearAdmission()" class="btn btn-gold">New Entry</button>
                    </div>
                </div>
            </div>

            <div id="p-finance" class="page" style="display:none;">
                <div class="card">
                    <h3>Payment Search</h3>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="f_search" placeholder="Search by ID...">
                        <button onclick="search('finance')" class="btn btn-primary">Search</button>
                    </div>
                    <div id="f_res" class="card" style="display:none; margin-top:20px; border:1px solid #eee;">
                        <div style="display:flex; gap:20px;">
                            <img id="f_img" style="width:100px; border-radius:10px;">
                            <div>
                                <h4 id="f_name_h"></h4>
                                <p id="f_info_h"></p>
                                <p id="f_contact_h" style="font-size:0.8rem; color:#666;"></p>
                            </div>
                        </div>
                        <div class="grid" style="margin-top:20px;">
                            <input type="number" id="f_amt" placeholder="Amount Paid">
                            <select id="f_status"><option value="Paid">Paid</option><option value="Pending">Pending</option></select>
                            <select id="f_type"><option value="Onsite">Onsite Cash</option><option value="Online">Online Payment</option></select>
                        </div>
                        <button onclick="updatePayment()" class="btn btn-primary" style="margin-top:15px;">Confirm Payment</button>
                    </div>
                </div>
            </div>

            <div id="p-idcard" class="page" style="display:none;">
                <div class="card">
                    <h3>ID Issuance</h3>
                    <input type="text" id="i_search" placeholder="Enter Student ID...">
                    <button onclick="search('id')" class="btn btn-primary" style="margin-top:10px;">Check Status</button>
                    <div id="i_res" class="card" style="display:none; margin-top:20px; text-align:center;">
                        <img id="i_img" style="width:120px; border:2px solid var(--gold);">
                        <h3 id="i_name_h"></h3>
                        <p id="i_stat_h"></p>
                        <div id="i_actions" style="display:flex; justify-content:center; gap:10px;">
                            <button onclick="updateID('Printed')" class="btn btn-gold">Mark as Printed</button>
                            <button onclick="updateID('Delivered')" class="btn btn-primary">Mark as Delivered</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="p-reports" class="page" style="display:none;">
                <div class="grid">
                    <div class="stats-card" style="background:#002147;">Registered: <h2 id="st_reg">0</h2></div>
                    <div class="stats-card" style="background:#28a745;">Paid: <h2 id="st_paid">0</h2></div>
                    <div class="stats-card" style="background:#dc3545;">Unpaid: <h2 id="st_unp">0</h2></div>
                    <div class="stats-card" style="background:#C5A059;">Printed: <h2 id="st_prn">0</h2></div>
                </div>
                <div class="card" style="margin-top:20px;">
                    <canvas id="statsChart" height="100"></canvas>
                    <button onclick="exportToExcel()" class="btn btn-gold" style="margin-top:20px;"><i class="fas fa-file-excel"></i> Export All Data to Excel</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycby1sE3AC0hkGgGLu2cbeo1Y72IuerKIeobZGKBIlzg3Ut4k7qHK5fEL13NPeSCdZGqdbA/exec';

        function showLoader(s) { document.getElementById('loader').style.display = s ? 'block' : 'none'; }

        // Session Check
        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('uec_user'));
            if(user) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('appSection').style.display = 'block';
                applyRole(user.role);
            }
        };

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'login', username:u, password:p}) });
            const d = await res.json();
            showLoader(false);
            if(d.success) {
                localStorage.setItem('uec_user', JSON.stringify(d));
                location.reload();
            } else alert('Invalid Credentials');
        }

        function logout() { localStorage.removeItem('uec_user'); location.reload(); }

        function applyRole(role) {
            const navs = ['n-adm', 'n-fin', 'n-id', 'n-rep'];
            navs.forEach(n => document.getElementById(n).style.display = 'none');
            if(role === 'Admin') navs.forEach(n => document.getElementById(n).style.display = 'flex');
            else if(role === 'Admission') document.getElementById('n-adm').style.display = 'flex';
            else if(role === 'Finance') document.getElementById('n-fin').style.display = 'flex';
            else if(role === 'ID') document.getElementById('n-id').style.display = 'flex';
            showPage(role === 'Admin' ? 'reports' : role.toLowerCase());
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none');
            const page = document.getElementById('p-' + p);
            if(page) page.style.display = 'block';
            if(p === 'reports') loadStats();
        }

        async function saveStudent() {
            showLoader(true);
            const params = {
                action: 'addStudent',
                id: document.getElementById('a_id').value,
                name: document.getElementById('a_name').value,
                faculty: document.getElementById('a_fac').value,
                phone: document.getElementById('a_phone').value,
                email: document.getElementById('a_mail').value,
                nid: document.getElementById('a_nid').value,
                photo: document.getElementById('a_photo').value
            };
            await fetch(API, { method: 'POST', body: new URLSearchParams(params) });
            showLoader(false);
            alert('Student Registered!');
        }

        function clearAdmission() {
            ['a_id','a_name','a_phone','a_mail','a_nid','a_photo'].forEach(i => document.getElementById(i).value = '');
        }

        async function search(type) {
            const id = document.getElementById(type === 'finance' ? 'f_search' : 'i_search').value;
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getStudent', id:id}) });
            const d = await res.json();
            showLoader(false);
            if(!d.success) return alert('Not Found');

            if(type === 'finance') {
                document.getElementById('f_res').style.display = 'block';
                document.getElementById('f_img').src = d.photo;
                document.getElementById('f_name_h').innerText = d.name;
                document.getElementById('f_info_h').innerText = d.faculty + ' | Status: ' + d.status;
                document.getElementById('f_contact_h').innerText = `Phone: ${d.phone} | Email: ${d.email}`;
                document.getElementById('f_amt').value = d.amount;
            } else {
                document.getElementById('i_res').style.display = 'block';
                document.getElementById('i_img').src = d.photo;
                document.getElementById('i_name_h').innerText = d.name;
                document.getElementById('i_stat_h').innerText = `Payment: ${d.status} | Printed: ${d.printed} | Delivered: ${d.delivered}`;
                document.getElementById('i_stat_h').style.color = d.status === 'Paid' ? 'green' : 'red';
            }
        }

        async function updatePayment() {
            showLoader(true);
            const params = {
                action: 'updatePayment',
                id: document.getElementById('f_search').value,
                amount: document.getElementById('f_amt').value,
                status: document.getElementById('f_status').value,
                type: document.getElementById('f_type').value
            };
            await fetch(API, { method: 'POST', body: new URLSearchParams(params) });
            showLoader(false);
            alert('Payment Updated!');
            search('finance');
        }

        async function updateID(field) {
            showLoader(true);
            await fetch(API, { method: 'POST', body: new URLSearchParams({action:'updateIDStatus', id:document.getElementById('i_search').value, field:field}) });
            showLoader(false);
            alert('Status Updated!');
            search('id');
        }

        async function loadStats() {
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getStats'}) });
            const d = await res.json();
            document.getElementById('st_reg').innerText = d.registered;
            document.getElementById('st_paid').innerText = d.paid;
            document.getElementById('st_unp').innerText = d.unpaid;
            document.getElementById('st_prn').innerText = d.printed;
            
            new Chart(document.getElementById('statsChart'), {
                type: 'bar',
                data: {
                    labels: ['Registered', 'Paid', 'Printed', 'Delivered'],
                    datasets: [{ label: 'University Stats', data: [d.registered, d.paid, d.printed, d.delivered], backgroundColor: ['#002147','#28a745','#C5A059','#17a2b8'] }]
                }
            });
        }
    </script>
</body>
</html>
