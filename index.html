<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEC | Professional Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0a192f; --secondary: #172a45; --gold: #C5A059; --text: #ccd6f6; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--primary); color: var(--text); }
        .sidebar { width: 260px; background: var(--secondary); height: 100vh; position: fixed; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #8892b0; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: var(--gold); background: rgba(197, 160, 89, 0.1); border-left: 4px solid var(--gold); }
        .main { margin-left: 260px; padding: 40px; min-height: 100vh; }
        .card { background: var(--white); border-radius: 15px; padding: 30px; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; box-sizing: border-box; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gold { background: var(--gold); color: white; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; color: white; }
        .login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .loader { display: none; position: fixed; top: 20px; right: 20px; background: var(--gold); color: white; padding: 10px 20px; border-radius: 50px; z-index: 2000; }
    </style>
</head>
<body>

    <div id="loader" class="loader"><i class="fas fa-sync fa-spin"></i> Processing...</div>

    <div id="loginSection" class="login-overlay">
        <div class="card" style="width: 350px; text-align: center;">
            <h2 style="color: var(--primary);">Student Admission Management</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Login</button>
        </div>
    </div>

    <div id="appSection" style="display:none;">
        <aside class="sidebar">
            <div style="padding: 30px; text-align: center;"><h2 style="color: var(--gold);">UEC</h2></div>
            <ul style="list-style: none; padding: 0;">
                <li id="n-adm" class="nav-item" onclick="showPage('admission')"><i class="fas fa-user-plus"></i> Admission</li>
                <li id="n-fin" class="nav-item" onclick="showPage('finance')"><i class="fas fa-coins"></i> Finance</li>
                <li id="n-id" class="nav-item" onclick="showPage('idcard')"><i class="fas fa-id-badge"></i> ID Management</li>
                <li id="n-rep" class="nav-item" onclick="showPage('reports')"><i class="fas fa-chart-pie"></i> Dashboard</li>
                <li class="nav-item" onclick="logout()" style="margin-top: 50px;"><i class="fas fa-sign-out-alt"></i> Logout</li>
            </ul>
        </aside>

        <main class="main">
            <div id="p-admission" class="page" style="display:none;">
                <div class="card">
                    <h3>Student Enrollment</h3>
                    <div class="grid">
                        <div><label>Application ID*</label><input type="text" id="a_id"></div>
                        <div><label>Full Name (4 Names)*</label><input type="text" id="a_name"></div>
                        <div><label>National ID (14 Digits)*</label><input type="text" id="a_nid" maxlength="14"></div>
                        <div><label>Faculty*</label><select id="a_fac"><option>Computing</option><option>Engineering</option></select></div>
                        <div><label>Email Address*</label><input type="email" id="a_mail"></div>
                        <div><label>Phone Number</label><input type="text" id="a_phone"></div>
                    </div>
                    <div style="margin-top:20px;"><label>Photo URL</label><input type="text" id="a_photo"></div>
                    <button onclick="saveStudent()" class="btn btn-primary" style="margin-top: 20px;">Save Student Record</button>
                </div>
            </div>

            <div id="p-finance" class="page" style="display:none;">
                <div class="card">
                    <h3>Financial Search</h3>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="f_search" placeholder="Search by ID...">
                        <button onclick="search('finance')" class="btn btn-primary">Search</button>
                    </div>
                    <div id="f_res" style="display:none; margin-top:25px; border-top:2px solid #eee; padding-top:20px;">
                        <div style="display:flex; gap:25px; align-items:center;">
                            <img id="f_img" style="width:120px; border-radius:10px; border:2px solid var(--gold);">
                            <div>
                                <h2 id="f_name_h" style="margin:0;"></h2>
                                <p id="f_info_h" style="color:var(--gold); font-weight:bold;"></p>
                                <p id="f_mail_h" style="font-size:0.9rem;"></p>
                                <div id="f_stat_badge"></div>
                            </div>
                        </div>
                        <div class="grid" style="margin-top:20px;">
                            <input type="number" id="f_amt" placeholder="Amount Paid">
                            <select id="f_type" onchange="toggleFinBtns()"><option value="Onsite">Onsite</option><option value="Online">Online</option></select>
                        </div>
                        <div style="display:flex; gap:10px; margin-top:20px;">
                            <button onclick="updatePayment()" class="btn btn-primary" style="flex:2;">Confirm & Update Payment</button>
                            <button id="f_btn_mail_student" onclick="notifyStudent()" class="btn btn-gold" style="flex:1;"><i class="fas fa-paper-plane"></i> Email Student</button>
                            <button id="f_btn_online_adm" onclick="notifyAdmission()" class="btn btn-primary" style="display:none; flex:1;"><i class="fas fa-envelope"></i> Email Admission</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="p-idcard" class="page" style="display:none;">
                <div class="card">
                    <h3>ID Status Tracker</h3>
                    <input type="text" id="i_search" placeholder="Search ID...">
                    <button onclick="search('id')" class="btn btn-primary" style="margin-top:10px;">Check All States</button>
                    <div id="i_res" style="display:none; margin-top:20px; text-align:center;">
                        <div style="display:flex; justify-content:center; gap:20px; margin-bottom:20px;">
                            <div class="stat-box">Payment: <span id="i_s_pay"></span></div>
                            <div class="stat-box">Printed: <span id="i_s_prn"></span></div>
                            <div class="stat-box">Delivered: <span id="i_s_del"></span></div>
                        </div>
                        <div style="display:flex; justify-content:center; gap:10px;">
                            <button onclick="updateID('Printed')" class="btn btn-gold">Mark Printed</button>
                            <button onclick="updateID('Delivered')" class="btn btn-primary">Mark Delivered</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="p-reports" class="page" style="display:none;">
                <div class="grid">
                    <div class="card" style="background:var(--primary); color:white;">Paid: <h2 id="st_paid">0</h2></div>
                    <div class="card" style="background:var(--gold); color:white;">Unpaid: <h2 id="st_unp">0</h2></div>
                    <div class="card" style="background:#2ecc71; color:white;">Delivered: <h2 id="st_del">0</h2></div>
                </div>
                <div class="card">
                    <canvas id="statsChart" height="100"></canvas>
                    <div style="margin-top:30px; display:flex; gap:15px;">
                        <button onclick="exportData('Paid')" class="btn btn-primary"><i class="fas fa-file-excel"></i> Export Paid Students</button>
                        <button onclick="exportData('Unpaid')" class="btn btn-gold"><i class="fas fa-file-excel"></i> Export Unpaid Students</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycby1sE3AC0hkGgGLu2cbeo1Y72IuerKIeobZGKBIlzg3Ut4k7qHK5fEL13NPeSCdZGqdbA/exec';
        let currentStudent = null;

        function showLoader(s) { document.getElementById('loader').style.display = s ? 'block' : 'none'; }

        // Login & Session
        window.onload = () => {
            const s = JSON.parse(localStorage.getItem('uec_s'));
            if(s) { document.getElementById('loginSection').style.display='none'; document.getElementById('appSection').style.display='block'; applyRole(s.role); }
        };

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'login', username:u, password:p}) });
            const d = await res.json();
            showLoader(false);
            if(d.success) { localStorage.setItem('uec_s', JSON.stringify(d)); location.reload(); }
            else alert('Invalid Login');
        }

        function logout() { localStorage.removeItem('uec_s'); location.reload(); }

        function applyRole(role) {
            const navs = ['n-adm','n-fin','n-id','n-rep'];
            navs.forEach(n => document.getElementById(n).style.display='none');
            if(role==='Admin') navs.forEach(n => document.getElementById(n).style.display='flex');
            else document.getElementById('n-'+role.toLowerCase().substring(0,3)).style.display='flex';
            showPage(role==='Admin'?'reports':role.toLowerCase());
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg=>pg.style.display='none');
            document.getElementById('p-'+p).style.display='block';
            if(p==='reports') loadStats();
        }

        // Logic
        async function saveStudent() {
            const name = document.getElementById('a_name').value;
            const nid = document.getElementById('a_nid').value;
            const id = document.getElementById('a_id').value;
            const mail = document.getElementById('a_mail').value;

            if(!id || !name || !nid || !mail) return alert('All starred fields are mandatory!');
            if(name.split(' ').length < 4) return alert('Please enter Full Name (at least 4 names)');
            if(nid.length !== 14 || isNaN(nid)) return alert('National ID must be exactly 14 digits');

            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({
                action: 'addStudent', id:id, name:name, nid:nid, faculty:document.getElementById('a_fac').value, 
                phone:document.getElementById('a_phone').value, email:mail, photo:document.getElementById('a_photo').value
            })});
            const d = await res.json();
            showLoader(false);
            alert(d.message);
        }

        async function search(type) {
            const id = document.getElementById(type==='finance'?'f_search':'i_search').value;
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getStudent', id:id}) });
            const d = await res.json();
            showLoader(false);
            if(!d.success) return alert('ID not found');
            currentStudent = d;
            currentStudent.id = id;

            if(type==='finance') {
                document.getElementById('f_res').style.display='block';
                document.getElementById('f_img').src = d.photo;
                document.getElementById('f_name_h').innerText = d.name;
                document.getElementById('f_info_h').innerText = d.faculty;
                document.getElementById('f_mail_h').innerText = d.email;
                const badge = document.getElementById('f_stat_badge');
                badge.innerText = d.status === 'Paid' ? 'PAID - ' + d.amount + ' EGP' : 'NOT PAID';
                badge.style.background = d.status === 'Paid' ? '#2ecc71' : '#e74c3c';
                badge.className = 'status-badge';
                document.getElementById('f_amt').value = d.amount || '';
            } else {
                document.getElementById('i_res').style.display='block';
                document.getElementById('i_s_pay').innerText = d.status;
                document.getElementById('i_s_prn').innerText = d.printed;
                document.getElementById('i_s_del').innerText = d.delivered;
            }
        }

        function toggleFinBtns() {
            const type = document.getElementById('f_type').value;
            document.getElementById('f_btn_online_adm').style.display = type === 'Online' ? 'flex' : 'none';
        }

        async function updatePayment() {
            showLoader(true);
            await fetch(API, { method: 'POST', body: new URLSearchParams({
                action: 'updatePayment', id:currentStudent.id, amount:document.getElementById('f_amt').value,
                status: 'Paid', type: document.getElementById('f_type').value
            })});
            showLoader(false);
            alert('Payment Confirmed');
            search('finance');
        }

        async function notifyStudent() {
            showLoader(true);
            await fetch(API, { method: 'POST', body: new URLSearchParams({
                action: 'sendStudentEmail', email: currentStudent.email, name: currentStudent.name
            })});
            showLoader(false);
            alert('Email sent to student!');
        }

        async function notifyAdmission() {
            alert('Notification sent to Admission Department!');
        }

        async function updateID(field) {
            showLoader(true);
            await fetch(API, { method: 'POST', body: new URLSearchParams({action:'updateIDStatus', id:currentStudent.id, field:field}) });
            showLoader(false);
            alert('Status Updated');
            search('id');
        }

        async function loadStats() {
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getStats'}) });
            const d = await res.json();
            document.getElementById('st_paid').innerText = d.paid;
            document.getElementById('st_unp').innerText = d.unpaid;
            document.getElementById('st_del').innerText = d.delivered;
            // Chart initialization logic here...
        }

        async function exportData(filter) {
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getFilteredData', filter:filter}) });
            const d = await res.json();
            showLoader(false);
            const ws = XLSX.utils.aoa_to_sheet(d.data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Students");
            XLSX.writeFile(wb, "UEC_"+filter+"_Report.xlsx");
        }
    </script>
</body>
</html>
