<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>UEC | Student Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0a192f; --secondary: #172a45; --gold: #C5A059; --white: #ffffff; --bg-light: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg-light); color: var(--primary); display: flex; flex-direction: column; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--primary); height: 100vh; position: fixed; box-shadow: 5px 0 15px rgba(0,0,0,0.5); z-index: 100; color: white; }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #8892b0; transition: 0.3s; border-left: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { color: var(--gold); background: rgba(197, 160, 89, 0.1); border-left-color: var(--gold); }
        .main { margin-left: 260px; padding: 40px; flex: 1; }
        .card { background: var(--white); border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 25px; border-top: 4px solid var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; box-sizing: border-box; background: #fafafa; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; justify-content: center; text-transform: uppercase; font-size: 0.85rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-outline { border: 2px solid var(--primary); color: var(--primary); background: transparent; }
        .loader { display: none; position: fixed; top: 20px; right: 20px; background: var(--gold); color: white; padding: 10px 25px; border-radius: 50px; z-index: 2000; font-weight: bold; }
        .photo-preview-container { width: 120px; height: 150px; border: 2px solid var(--gold); border-radius: 10px; margin-top: 10px; display: flex; align-items: center; justify-content: center; background: #eee; overflow: hidden; }
        .photo-preview-container img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .login-overlay { position: fixed; inset: 0; background: radial-gradient(circle, var(--secondary), var(--primary)); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        footer { margin-left: 260px; padding: 25px; text-align: center; background: #fff; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="loader" class="loader"><i class="fas fa-sync fa-spin"></i> Processing...</div>

    <!-- Login -->
    <div id="loginSection" class="login-overlay">
        <div class="card" style="width: 380px; text-align: center; border-top: none;">
            <h2 style="color: var(--primary); margin-bottom: 20px;">UEC SYSTEM LOGIN</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password" style="margin-top:10px;">
            <button onclick="login()" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Login</button>
        </div>
    </div>

    <!-- App -->
    <div id="appSection" style="display:none;">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3 style="color: var(--gold); margin: 0;">UEC PORTAL</h3>
            </div>
            <ul style="list-style: none; padding: 0;">
                <li id="n-adm" class="nav-item" onclick="showPage('admission')"><i class="fas fa-user-plus"></i> Admission</li>
                <li id="n-fin" class="nav-item" onclick="showPage('finance')"><i class="fas fa-money-check-alt"></i> Finance</li>
                <li id="n-idc" class="nav-item" onclick="showPage('idcard')"><i class="fas fa-id-card"></i> ID Cards</li>
                <li id="n-rep" class="nav-item" onclick="showPage('reports')"><i class="fas fa-chart-pie"></i> Dashboard</li>
                <li class="nav-item" onclick="logout()" style="color: #ff6b6b;"><i class="fas fa-sign-out-alt"></i> Logout</li>
            </ul>
        </aside>

        <main class="main">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: #fff; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                <h2 id="pageTitle" style="margin:0; color: var(--primary);">Admission</h2>
                <span id="user_display" style="font-weight: bold; color: var(--gold);">User</span>
            </div>

            <!-- Admission Page -->
            <div id="p-admission" class="page">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h3 style="margin:0;">Student Enrollment</h3>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="a_search_id" placeholder="Search ID..." style="width: 150px; margin:0;">
                            <button onclick="searchAdmission()" class="btn btn-primary"><i class="fas fa-search"></i></button>
                            <button onclick="resetAdmissionUI()" class="btn btn-gold"><i class="fas fa-sync"></i></button>
                        </div>
                    </div>
                    <div class="grid">
                        <div><label>Application ID*</label><input type="text" id="a_id"></div>
                        <div><label>Full Name*</label><input type="text" id="a_name"></div>
                        <div><label>National ID*</label><input type="text" id="a_nid" maxlength="14"></div>
                        <div><label>Faculty*</label>
                            <select id="a_fac">
                                <option>Faculty of Arts and Design</option>
                                <option>Faculty of Business and Economics</option>
                                <option>Faculty of Computer Science</option>
                                <option>Faculty of Dentistry</option>
                                <option>Faculty of Engineering</option>
                                <option>Faculty of Medicine</option>
                                <option>Faculty of Pharmacy</option>
                            </select>
                        </div>
                        <div><label>Email Address*</label><input type="email" id="a_mail"></div>
                        <div><label>Phone Number</label><input type="text" id="a_phone"></div>
                    </div>
                    <div style="margin-top:20px; display: flex; gap: 20px; align-items: center;">
                        <div style="flex: 1;">
                            <label>Student Photo</label>
                            <input type="file" id="a_file" accept="image/*" onchange="previewImage(this)">
                        </div>
                        <div class="photo-preview-container">
                            <i class="fas fa-camera" id="previewPlaceholder" style="font-size: 1.5rem; color: #ccc;"></i>
                            <img id="a_preview_img" src="">
                        </div>
                    </div>
                    <div style="margin-top:30px; display:flex; gap:15px;">
                        <button id="btn_save_new" onclick="saveStudent()" class="btn btn-primary" style="flex: 1;"><i class="fas fa-plus-circle"></i> Save New Student</button>
                        <button id="btn_update_existing" onclick="updateStudent()" class="btn btn-gold" style="flex: 1; display: none;"><i class="fas fa-edit"></i> Update Student Data</button>
                    </div>
                </div>
            </div>

            <!-- Finance Page -->
            <div id="p-finance" class="page" style="display:none;">
                <div class="card">
                    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <div style="display:flex; gap:10px; flex: 1;">
                            <input type="text" id="f_search" placeholder="Enter Student ID..." style="margin:0;">
                            <button onclick="searchFinance()" class="btn btn-primary">Search</button>
                        </div>
                        <button onclick="exportFinanceData()" class="btn btn-gold" style="background: #10b981; margin-left: 10px;">
                            <i class="fas fa-file-excel"></i> Export Paid List
                        </button>
                    </div>
                    <div id="f_res" style="display:none; border-top: 1px solid #eee; padding-top: 20px;">
                        <div style="display:flex; gap:20px; align-items:center;">
                            <img id="f_img" style="width:100px; height:120px; object-fit:cover; border-radius:8px; border: 1px solid #ddd;">
                            <div>
                                <h3 id="f_name_h" style="margin:0;"></h3>
                                <p id="f_info_h" style="color:var(--gold); margin:5px 0; font-weight:bold;"></p>
                                <p id="f_mail_h" style="margin:0; font-size:0.9rem;"></p>
                            </div>
                        </div>
                        <div class="grid" style="margin-top:20px;">
                            <div><label>Current Total Paid</label><input type="text" id="f_paid_amt" disabled></div>
                            <div><label>New Payment Amount</label><input type="number" id="f_amt"></div>
                            <div><label>Payment Method</label>
                                <select id="f_type">
                                    <option value="Onsite">Onsite (Cash/Card)</option>
                                    <option value="Online">Online Transfer</option>
                                </select>
                            </div>
                        </div>
                        <button onclick="updatePayment()" class="btn btn-primary" style="margin-top:20px; width:100%;">Confirm Payment</button>
                    </div>
                </div>
            </div>

            <!-- ID Card Page -->
            <div id="p-idcard" class="page" style="display:none;">
                <div class="card">
                    <div style="display:flex; gap:10px; margin-bottom:20px;">
                        <input type="text" id="i_search" placeholder="Search ID for printing...">
                        <button onclick="searchID()" class="btn btn-primary">Check</button>
                    </div>
                    <div id="i_res" style="display:none; text-align:center;">
                        <img id="i_img" style="width:100px; height:120px; border-radius:8px; margin-bottom:15px; border: 1px solid #ddd;">
                        <h3 id="i_name_h" style="margin:5px;"></h3>
                        <div style="display:flex; gap:10px; justify-content:center; margin:20px 0;">
                            <div style="background:#f8f9fa; padding:10px; border-radius:8px; flex:1;">Pay: <b id="i_s_pay"></b></div>
                            <div style="background:#f8f9fa; padding:10px; border-radius:8px; flex:1;">Print: <b id="i_s_prn"></b></div>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button onclick="updateID('Printed')" class="btn btn-gold" style="flex:1;">Mark Printed</button>
                            <button onclick="updateID('Delivered')" class="btn btn-primary" style="flex:1;">Mark Delivered</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Reports Page -->
            <div id="p-reports" class="page" style="display:none;">
                <div class="grid">
                    <div class="card" style="text-align:center;"><span>Total Students</span><h2 id="st_total">0</h2></div>
                    <div class="card" style="text-align:center;"><span>Total Paid</span><h2 id="st_paid" style="color:#10b981;">0</h2></div>
                    <div class="card" style="text-align:center;"><span>Pending</span><h2 id="st_unp" style="color:#ef4444;">0</h2></div>
                </div>
                <button onclick="exportFullData()" class="btn btn-primary" style="width:100%;"><i class="fas fa-download"></i> Download Full Database (Excel)</button>
            </div>
        </main>
        <footer>© 2026 University of East Capital | Administrative Portal</footer>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbwadOthwImhldvCRp_-IRoXA-3PX79HMLksAg-N04ZCyEyJAzi8RAIz0MIC3NgsHvDd/exec';
        let activeStudent = null;

        function showLoader(v) { document.getElementById('loader').style.display = v ? 'block' : 'none'; }

        // Auth Logic
        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            showLoader(true);
            try {
                const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'login', username:u, password:p}) });
                const d = await res.json();
                if(d.success) { 
                    localStorage.setItem('uec_session', JSON.stringify(d)); 
                    location.reload(); 
                } else alert('Invalid Credentials');
            } catch(e) { alert('Connection Error'); }
            showLoader(false);
        }

        window.onload = () => {
            const s = JSON.parse(localStorage.getItem('uec_session'));
            if(s) {
                document.getElementById('loginSection').style.display='none';
                document.getElementById('appSection').style.display='block';
                document.getElementById('user_display').innerText = s.user;
                setupAccess(s.role);
            }
        };

        function logout() { localStorage.removeItem('uec_session'); location.reload(); }

        function setupAccess(role) {
            const navs = ['n-adm','n-fin','n-idc','n-rep'];
            navs.forEach(n => document.getElementById(n).style.display='none');
            if(role==='Admin') navs.forEach(n => document.getElementById(n).style.display='flex');
            else {
                const key = role.toLowerCase().substring(0,3);
                document.getElementById('n-'+(key==='id '?'idc':key)).style.display='flex';
            }
            showPage(role==='Admin'?'reports': (role==='Finance'?'finance': (role==='Admission'?'admission':'idcard')));
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg=>pg.style.display='none');
            document.querySelectorAll('.nav-item').forEach(nv=>nv.classList.remove('active'));
            document.getElementById('p-'+p).style.display='block';
            document.getElementById('pageTitle').innerText = p.toUpperCase();
            if(p==='reports') loadStats();
        }

        // Admission Logic
        async function searchAdmission() {
            const id = document.getElementById('a_search_id').value;
            if(!id) return;
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getStudent', id:id}) });
            const d = await res.json();
            showLoader(false);
            
            if(d.success) {
                document.getElementById('a_id').value = id;
                document.getElementById('a_id').disabled = true;
                document.getElementById('a_name').value = d.name;
                document.getElementById('a_nid').value = d.nid;
                document.getElementById('a_fac').value = d.faculty;
                document.getElementById('a_mail').value = d.email;
                document.getElementById('a_phone').value = d.phone;
                document.getElementById('a_preview_img').src = d.photo;
                document.getElementById('a_preview_img').style.display = 'block';
                document.getElementById('previewPlaceholder').style.display = 'none';
                
                // التبديل بين الأزرار
                document.getElementById('btn_save_new').style.display = 'none';
                document.getElementById('btn_update_existing').style.display = 'flex';
            } else alert('Student ID not found');
        }

        async function updateStudent() {
            const id = document.getElementById('a_id').value;
            const fileInput = document.getElementById('a_file');
            showLoader(true);
            
            const params = {
                action: 'updateStudentData', id: id,
                name: document.getElementById('a_name').value,
                nid: document.getElementById('a_nid').value,
                faculty: document.getElementById('a_fac').value,
                phone: document.getElementById('a_phone').value,
                email: document.getElementById('a_mail').value
            };

            if(fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = async () => {
                    params.fileData = reader.result.split(',')[1];
                    params.filename = id + ".jpg";
                    const r = await fetch(API, { method: 'POST', body: new URLSearchParams(params) });
                    alert((await r.json()).message);
                    resetAdmissionUI();
                    showLoader(false);
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                const r = await fetch(API, { method: 'POST', body: new URLSearchParams(params) });
                alert((await r.json()).message);
                resetAdmissionUI();
                showLoader(false);
            }
        }

        async function saveStudent() {
            const id = document.getElementById('a_id').value;
            const photo = document.getElementById('a_file').files[0];
            if(!id || !photo) return alert('ID and Photo are required');
            showLoader(true);
            const reader = new FileReader();
            reader.onload = async () => {
                const res = await fetch(API, { method: 'POST', body: new URLSearchParams({
                    action: 'addStudentWithPhoto', id: id,
                    name: document.getElementById('a_name').value,
                    nid: document.getElementById('a_nid').value,
                    faculty: document.getElementById('a_fac').value,
                    phone: document.getElementById('a_phone').value,
                    email: document.getElementById('a_mail').value,
                    fileData: reader.result.split(',')[1], filename: id+".jpg"
                })});
                alert((await res.json()).message);
                resetAdmissionUI();
                showLoader(false);
            };
            reader.readAsDataURL(photo);
        }

        function resetAdmissionUI() {
            document.getElementById('a_id').disabled = false;
            document.getElementById('btn_save_new').style.display = 'flex';
            document.getElementById('btn_update_existing').style.display = 'none';
            ['a_id','a_name','a_nid','a_mail','a_phone','a_file','a_search_id'].forEach(i=>document.getElementById(i).value='');
            document.getElementById('a_preview_img').style.display='none';
            document.getElementById('previewPlaceholder').style.display='block';
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('a_preview_img').src = e.target.result;
                    document.getElementById('a_preview_img').style.display = 'block';
                    document.getElementById('previewPlaceholder').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Finance Logic
        async function searchFinance() {
            const id = document.getElementById('f_search').value;
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getStudent', id:id}) });
            const d = await res.json();
            showLoader(false);
            if(d.success) {
                activeStudent = {id, ...d};
                document.getElementById('f_res').style.display='block';
                document.getElementById('f_img').src = d.photo;
                document.getElementById('f_name_h').innerText = d.name;
                document.getElementById('f_info_h').innerText = d.faculty + " | Status: " + d.status;
                document.getElementById('f_mail_h').innerText = d.email;
                document.getElementById('f_paid_amt').value = d.amount || 0;
            } else alert('Not Found');
        }

        async function updatePayment() {
            const amt = document.getElementById('f_amt').value;
            if(!amt) return;
            showLoader(true);
            await fetch(API, { method: 'POST', body: new URLSearchParams({
                action:'updatePayment', id:activeStudent.id, amount:amt, type:document.getElementById('f_type').value, status:'Paid'
            })});
            showLoader(false);
            alert('Payment Updated');
            searchFinance();
        }

        async function exportFinanceData() {
            showLoader(true);
            try {
                const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action: 'getFilteredData', filter: 'Paid'}) });
                const d = await res.json();
                if(d.success && d.data.length > 1) {
                    const ws = XLSX.utils.aoa_to_sheet(d.data);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "Paid Students");
                    XLSX.writeFile(wb, "UEC_Paid_List.xlsx");
                } else alert('No paid students found to export.');
            } catch(e) { alert('Export Failed'); }
            showLoader(false);
        }

        // ID Card Logic
        async function searchID() {
            const id = document.getElementById('i_search').value;
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getStudent', id:id}) });
            const d = await res.json();
            showLoader(false);
            if(d.success) {
                activeStudent = {id, ...d};
                document.getElementById('i_res').style.display='block';
                document.getElementById('i_img').src = d.photo;
                document.getElementById('i_name_h').innerText = d.name;
                document.getElementById('i_s_pay').innerText = d.status;
                document.getElementById('i_s_prn').innerText = d.printed || 'No';
            }
        }

        async function updateID(status) {
            showLoader(true);
            await fetch(API, { method: 'POST', body: new URLSearchParams({action:'updateIDStatus', id:activeStudent.id, field:status}) });
            showLoader(false);
            alert('ID Card Status Updated');
            searchID();
        }

        // Dashboard Stats
        async function loadStats() {
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getStats'}) });
            const d = await res.json();
            document.getElementById('st_total').innerText = d.registered;
            document.getElementById('st_paid').innerText = d.paid;
            document.getElementById('st_unp').innerText = d.unpaid;
        }

        async function exportFullData() {
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getFilteredData', filter:'All'}) });
            const d = await res.json();
            const ws = XLSX.utils.aoa_to_sheet(d.data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Full Database");
            XLSX.writeFile(wb, "UEC_Full_Database.xlsx");
            showLoader(false);
        }
    </script>
</body>
</html>
