<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>UEC | Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0a192f; --secondary: #172a45; --gold: #C5A059; --text: #ccd6f6; --white: #ffffff; --bg-light: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg-light); color: var(--primary); display: flex; flex-direction: column; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--primary); height: 100vh; position: fixed; box-shadow: 5px 0 15px rgba(0,0,0,0.5); z-index: 100; color: white; }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #8892b0; transition: 0.3s; border-left: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { color: var(--gold); background: rgba(197, 160, 89, 0.1); border-left-color: var(--gold); }
        .main { margin-left: 260px; padding: 40px; flex: 1; }
        .card { background: var(--white); border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 25px; border-top: 4px solid var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; box-sizing: border-box; background: #fafafa; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; justify-content: center; text-transform: uppercase; font-size: 0.85rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-outline { border: 2px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .login-overlay { position: fixed; inset: 0; background: radial-gradient(circle, var(--secondary), var(--primary)); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .loader { display: none; position: fixed; top: 20px; right: 20px; background: var(--gold); color: white; padding: 10px 25px; border-radius: 50px; z-index: 2000; font-weight: bold; }
        .photo-preview-container { width: 120px; height: 150px; border: 2px solid var(--gold); border-radius: 10px; margin-top: 10px; display: flex; align-items: center; justify-content: center; background: #eee; overflow: hidden; }
        .photo-preview-container img { width: 100%; height: 100%; object-fit: cover; display: none; }
        footer { margin-left: 260px; padding: 25px; text-align: center; background: #fff; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="loader" class="loader"><i class="fas fa-sync fa-spin"></i> Processing...</div>

    <!-- Login Section -->
    <div id="loginSection" class="login-overlay">
        <div class="card" style="width: 380px; text-align: center;">
            <img src="https://amrattiaewais69-gif.github.io/Student-Admission-Management-System/photos/logo.png" width="80">
            <h2 style="color: #0000FF; margin: 15px 0;">University <span style="color: #C5A059;">of</span> East Capital</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password" style="margin-top:10px;">
            <button onclick="login()" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Login</button>
        </div>
    </div>

    <!-- App Section -->
    <div id="appSection" style="display:none;">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="https://amrattiaewais69-gif.github.io/Student-Admission-Management-System/photos/logo.png" width="50" style="filter: brightness(0) invert(1);">
                <h3 style="color: var(--gold); margin: 10px 0;">UEC ADMIN</h3>
            </div>
            <ul style="list-style: none; padding: 0;">
                <li id="n-adm" class="nav-item" onclick="showPage('admission')"><i class="fas fa-user-plus"></i> Admission</li>
                <li id="n-fin" class="nav-item" onclick="showPage('finance')"><i class="fas fa-file-invoice-dollar"></i> Finance</li>
                <li id="n-id" class="nav-item" onclick="showPage('idcard')"><i class="fas fa-id-card"></i> ID Cards</li>
                <li id="n-rep" class="nav-item" onclick="showPage('reports')"><i class="fas fa-chart-line"></i> Dashboard</li>
                <li class="nav-item" onclick="logout()" style="color: #ff6b6b;"><i class="fas fa-power-off"></i> Logout</li>
            </ul>
        </aside>

        <main class="main">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: #fff; padding: 15px 25px; border-radius: 12px;">
                <h2 id="pageTitle" style="margin:0;">Dashboard</h2>
                <span id="user_display" style="font-weight: bold; color: var(--gold);">User</span>
            </div>

            <!-- Page: Admission -->
            <div id="p-admission" class="page" style="display:none;">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <h3>Student Enrollment</h3>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="a_search_id" placeholder="Search ID..." style="width:150px; margin:0;">
                            <button onclick="searchAdmission()" class="btn btn-primary"><i class="fas fa-search"></i></button>
                            <button onclick="resetAdmissionUI()" class="btn btn-outline"><i class="fas fa-redo"></i></button>
                        </div>
                    </div>
                    <div class="grid">
                        <div><label>Application ID*</label><input type="text" id="a_id"></div>
                        <div><label>Full Name*</label><input type="text" id="a_name"></div>
                        <div><label>National ID*</label><input type="text" id="a_nid" maxlength="14"></div>
                        <div><label>Faculty*</label>
                            <select id="a_fac">
                                <option>Faculty of Computer Science</option>
                                <option>Faculty of Engineering</option>
                                <option>Faculty of Business</option>
                                <option>Faculty of Dentistry</option>
                                <option>Faculty of Medicine</option>
                            </select>
                        </div>
                        <div><label>Email Address*</label><input type="email" id="a_mail"></div>
                        <div><label>Phone Number</label><input type="text" id="a_phone"></div>
                    </div>
                    <div style="margin-top:20px; display:flex; gap:20px; align-items:center;">
                        <div style="flex:1;">
                            <label>Student Photo</label>
                            <input type="file" id="a_file" accept="image/*" onchange="previewImage(this)">
                        </div>
                        <div class="photo-preview-container">
                            <i id="previewPlaceholder" class="fas fa-user" style="font-size:30px; color:#ccc;"></i>
                            <img id="a_preview_img">
                        </div>
                    </div>
                    <div style="margin-top:25px; display:flex; gap:10px;">
                        <button id="btn_save_new" onclick="saveStudent()" class="btn btn-primary"><i class="fas fa-save"></i> Save New Student</button>
                        <button id="btn_update_existing" onclick="updateStudent()" class="btn btn-gold" style="display:none;"><i class="fas fa-user-edit"></i> Update Record</button>
                    </div>
                </div>
            </div>

            <!-- Page: Finance -->
            <div id="p-finance" class="page" style="display:none;">
                <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <button onclick="exportData('Paid')" class="btn btn-success" style="flex:1;"><i class="fas fa-file-excel"></i> Export Paid</button>
                    <button onclick="exportData('Unpaid')" class="btn btn-danger" style="flex:1;"><i class="fas fa-file-excel"></i> Export Unpaid</button>
                </div>
                <div class="card">
                    <div style="display:flex; gap:10px; margin-bottom:20px;">
                        <input type="text" id="f_search" placeholder="Search ID for Payment...">
                        <button onclick="search('finance')" class="btn btn-primary">Search</button>
                    </div>
                    <div id="f_res" style="display:none;">
                        <div style="display:flex; gap:20px; align-items:center; background:#f8f9fa; padding:15px; border-radius:10px;">
                            <img id="f_img" style="width:80px; height:100px; border-radius:5px; object-fit:cover;">
                            <div>
                                <h3 id="f_name_h" style="margin:0;"></h3>
                                <p id="f_info_h" style="margin:5px 0; color:var(--gold);"></p>
                                <div id="f_stat_badge" style="padding:4px 12px; border-radius:20px; font-size:12px; color:white;"></div>
                            </div>
                        </div>
                        <div class="grid" style="margin-top:20px;">
                            <div><label>Last Paid Amount</label><input type="text" id="f_paid_amt" disabled></div>
                            <div><label>New Amount</label><input type="number" id="f_amt"></div>
                            <div><label>Payment Method</label>
                                <select id="f_type">
                                    <option value="Onsite">Onsite</option>
                                    <option value="Online">Online</option>
                                </select>
                            </div>
                        </div>
                        <button onclick="updatePayment()" class="btn btn-primary" style="margin-top:20px; width:100%;">Confirm Payment</button>
                    </div>
                </div>
            </div>

            <!-- Page: ID Cards -->
            <div id="p-idcard" class="page" style="display:none;">
                <div class="card">
                    <div style="display:flex; gap:10px; margin-bottom:20px;">
                        <input type="text" id="i_search" placeholder="Enter Student ID...">
                        <button onclick="search('id')" class="btn btn-primary">Verify</button>
                    </div>
                    <div id="i_res" style="display:none; text-align:center;">
                        <img id="i_img" style="width:120px; border-radius:10px; margin-bottom:15px;">
                        <h3 id="i_name_h"></h3>
                        <div style="display:flex; gap:15px; justify-content:center; margin:20px 0;">
                            <div style="background:#eee; padding:10px; border-radius:8px;">Payment: <b id="i_s_pay"></b></div>
                            <div style="background:#eee; padding:10px; border-radius:8px;">Print: <b id="i_s_prn"></b></div>
                        </div>
                        <button onclick="updateID('Printed')" class="btn btn-gold">Mark as Printed</button>
                        <button onclick="updateID('Delivered')" class="btn btn-primary" style="margin-top:10px;">Mark as Delivered</button>
                    </div>
                </div>
            </div>

            <!-- Page: Reports -->
            <div id="p-reports" class="page" style="display:none;">
                <div class="grid">
                    <div class="card" style="text-align:center;"><span>Total Students</span><h2 id="st_total">0</h2></div>
                    <div class="card" style="text-align:center; border-top-color:#10b981;"><span>Total Paid</span><h2 id="st_paid">0</h2></div>
                    <div class="card" style="text-align:center; border-top-color:#ef4444;"><span>Total Unpaid</span><h2 id="st_unp">0</h2></div>
                </div>
                <div class="card">
                    <canvas id="statsChart" style="max-height:300px;"></canvas>
                </div>
                <button onclick="exportData('All')" class="btn btn-primary" style="width:100%;"><i class="fas fa-download"></i> Download Full Database (Excel)</button>
            </div>
        </main>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbwadOthwImhldvCRp_-IRoXA-3PX79HMLksAg-N04ZCyEyJAzi8RAIz0MIC3NgsHvDd/exec';
        let currentStudent = null;
        let chart = null;

        function showLoader(s) { document.getElementById('loader').style.display = s ? 'block' : 'none'; }

        // --- AUTH ---
        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            showLoader(true);
            try {
                const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'login', username:u, password:p}) });
                const d = await res.json();
                if(d.success) {
                    localStorage.setItem('uec_s', JSON.stringify(d));
                    location.reload();
                } else alert('Access Denied');
            } catch(e) { alert('Connection Error'); }
            showLoader(false);
        }

        window.onload = () => {
            const s = JSON.parse(localStorage.getItem('uec_s'));
            if(s) {
                document.getElementById('loginSection').style.display='none';
                document.getElementById('appSection').style.display='block';
                document.getElementById('user_display').innerText = s.user;
                applyRole(s.role);
            }
        };

        function logout() { localStorage.removeItem('uec_s'); location.reload(); }

        function applyRole(role) {
            const navs = ['n-adm','n-fin','n-id','n-rep'];
            navs.forEach(n => document.getElementById(n).style.display='none');
            if(role==='Admin') navs.forEach(n => document.getElementById(n).style.display='flex');
            else document.getElementById('n-'+role.toLowerCase().substring(0,3)).style.display='flex';
            showPage(role==='Admin'?'reports':role.toLowerCase());
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg=>pg.style.display='none');
            document.querySelectorAll('.nav-item').forEach(ni=>ni.classList.remove('active'));
            document.getElementById('p-'+p).style.display='block';
            document.getElementById('pageTitle').innerText = p.toUpperCase();
            if(p==='reports') loadStats();
        }

        // --- ADMISSION FUNCTIONS ---
        function previewImage(input) {
            const preview = document.getElementById('a_preview_img');
            const placeholder = document.getElementById('previewPlaceholder');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveStudent() {
            const id = document.getElementById('a_id').value;
            const name = document.getElementById('a_name').value;
            const file = document.getElementById('a_file').files[0];
            if(!id || !name) return alert('ID and Name are required');
            
            showLoader(true);
            let photoData = "";
            if(file) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                await new Promise(r => reader.onload = r);
                photoData = reader.result;
            }

            const params = {
                action: 'addStudentWithPhoto',
                id, name, 
                nid: document.getElementById('a_nid').value,
                faculty: document.getElementById('a_fac').value,
                email: document.getElementById('a_mail').value,
                phone: document.getElementById('a_phone').value,
                photo: photoData
            };

            await fetch(API, { method: 'POST', body: new URLSearchParams(params) });
            showLoader(false);
            alert('Student Saved Successfully');
            resetAdmissionUI();
        }

        // --- EXPORT FUNCTION (FIXED) ---
        async function exportData(filter) {
            showLoader(true);
            try {
                // Fetch stats to get the fullData array
                const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action: 'getStats'}) });
                const stats = await res.json();
                const allData = stats.fullData;

                if (!allData || allData.length <= 1) {
                    showLoader(false);
                    alert('No data available to export.');
                    return;
                }

                let rows = allData.slice(1); // Skip Header
                if (filter !== 'All') {
                    rows = rows.filter(r => r[7] === filter);
                }

                if (rows.length === 0) {
                    showLoader(false);
                    alert(`No records found for: ${filter}`);
                    return;
                }

                const headers = ["ID", "Name", "Faculty", "Email", "Phone", "Status", "Amount", "Method"];
                const excelData = rows.map(r => [r[0], r[1], r[3], r[5], r[4], r[7], r[8], r[9]]);

                const ws = XLSX.utils.aoa_to_sheet([headers, ...excelData]);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "UEC_Report");
                XLSX.writeFile(wb, `UEC_${filter}_Report.xlsx`);
            } catch (e) {
                alert('Export failed. Check connection.');
            }
            showLoader(false);
        }

        // --- OTHER CORE FUNCTIONS ---
        async function search(type) {
            const id = document.getElementById(type==='finance'?'f_search':'i_search').value;
            if(!id) return alert('Enter ID');
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getStudent', id:id}) });
            const d = await res.json();
            showLoader(false);
            if(!d.success) return alert('Not Found');
            
            currentStudent = d; currentStudent.id = id;
            if(type==='finance') {
                document.getElementById('f_res').style.display='block';
                document.getElementById('f_img').src = d.photo;
                document.getElementById('f_name_h').innerText = d.name;
                document.getElementById('f_info_h').innerText = d.faculty;
                document.getElementById('f_stat_badge').innerText = d.status;
                document.getElementById('f_stat_badge').style.background = d.status==='Paid'?'#10b981':'#ef4444';
                document.getElementById('f_paid_amt').value = d.amount || 0;
            } else {
                document.getElementById('i_res').style.display='block';
                document.getElementById('i_img').src = d.photo;
                document.getElementById('i_name_h').innerText = d.name;
                document.getElementById('i_s_pay').innerText = d.status;
                document.getElementById('i_s_prn').innerText = d.printed || 'No';
            }
        }

        async function updatePayment() {
            const amt = document.getElementById('f_amt').value;
            if(!amt) return alert('Enter amount');
            showLoader(true);
            await fetch(API, { method: 'POST', body: new URLSearchParams({
                action: 'updatePayment', id: currentStudent.id, amount: amt,
                status: 'Paid', type: document.getElementById('f_type').value
            })});
            showLoader(false); alert('Payment Recorded'); search('finance');
        }

        async function loadStats() {
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getStats'}) });
            const d = await res.json();
            document.getElementById('st_total').innerText = d.registered;
            document.getElementById('st_paid').innerText = d.paid;
            document.getElementById('st_unp').innerText = d.unpaid;
            updateChart(d.paid, d.unpaid);
        }

        function updateChart(p, u) {
            const ctx = document.getElementById('statsChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Paid', 'Unpaid'],
                    datasets: [{ data: [p, u], backgroundColor: ['#10b981', '#ef4444'] }]
                }
            });
        }

        function resetAdmissionUI() {
            document.querySelectorAll('#p-admission input').forEach(i=>i.value="");
            document.getElementById('a_preview_img').style.display='none';
            document.getElementById('previewPlaceholder').style.display='block';
            document.getElementById('btn_save_new').style.display='block';
            document.getElementById('btn_update_existing').style.display='none';
        }

        async function updateID(val) {
            showLoader(true);
            await fetch(API, { method: 'POST', body: new URLSearchParams({
                action: 'updateIDStatus', id: currentStudent.id, 
                field: val === 'Printed' ? 'printed' : 'delivered', value: 'Yes'
            })});
            showLoader(false); alert('ID Status Updated'); search('id');
        }
    </script>
</body>
</html>
