<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>UEC | Professional Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0a192f; --secondary: #172a45; --gold: #C5A059; --text: #ccd6f6; --white: #ffffff; --bg-light: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg-light); color: var(--primary); display: flex; flex-direction: column; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--primary); height: 100vh; position: fixed; box-shadow: 5px 0 15px rgba(0,0,0,0.5); z-index: 100; color: white; }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #8892b0; transition: 0.3s; border-left: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { color: var(--gold); background: rgba(197, 160, 89, 0.1); border-left-color: var(--gold); }
        .main { margin-left: 260px; padding: 40px; flex: 1; }
        .card { background: var(--white); border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 25px; border-top: 4px solid var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; box-sizing: border-box; background: #fafafa; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; justify-content: center; text-transform: uppercase; font-size: 0.85rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gold { background: var(--gold); color: white; }
        .login-overlay { position: fixed; inset: 0; background: radial-gradient(circle, var(--secondary), var(--primary)); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .loader { display: none; position: fixed; top: 20px; right: 20px; background: var(--gold); color: white; padding: 10px 25px; border-radius: 50px; z-index: 2000; font-weight: bold; }
        .photo-preview-container { width: 120px; height: 150px; border: 2px solid var(--gold); border-radius: 10px; margin-top: 10px; display: flex; align-items: center; justify-content: center; background: #eee; overflow: hidden; }
        .photo-preview-container img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .status-badge { padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; color: white; display: inline-block; margin-top: 10px; }
        .stat-box { background: #f8f9fa; padding: 15px; border-radius: 10px; flex: 1; text-align: center; border: 1px solid #eee; }
        footer { margin-left: 260px; padding: 25px; text-align: center; background: #fff; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="loader" class="loader"><i class="fas fa-sync fa-spin"></i> Processing...</div>

    <!-- Login Section -->
    <div id="loginSection" class="login-overlay">
        <div class="card" style="width: 380px; text-align: center;">
            <img src="https://amrattiaewais69-gif.github.io/Student-Admission-Management-System/photos/logo.png" width="80" style="margin-bottom: 10px;">
            <h2>UEC PORTAL</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password" style="margin-top:10px;">
            <button onclick="login()" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Login</button>
        </div>
    </div>

    <!-- App Section -->
    <div id="appSection" style="display:none;">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="https://amrattiaewais69-gif.github.io/Student-Admission-Management-System/photos/logo.png" width="50" style="filter: brightness(0) invert(1);">
                <h3 style="color: var(--gold); margin: 5px 0;">UEC SYSTEM</h3>
            </div>
            <ul style="list-style: none; padding: 0;">
                <li id="n-adm" class="nav-item" onclick="showPage('admission')"><i class="fas fa-user-plus"></i> Admission</li>
                <li id="n-fin" class="nav-item" onclick="showPage('finance')"><i class="fas fa-file-invoice-dollar"></i> Finance</li>
                <li id="n-id" class="nav-item" onclick="showPage('idcard')"><i class="fas fa-id-card"></i> ID Cards</li>
                <li id="n-rep" class="nav-item" onclick="showPage('reports')"><i class="fas fa-chart-line"></i> Dashboard</li>
                <li class="nav-item" onclick="logout()" style="color: #ff6b6b;"><i class="fas fa-power-off"></i> Logout</li>
            </ul>
        </aside>

        <main class="main">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: #fff; padding: 15px 25px; border-radius: 12px;">
                <h2 id="pageTitle" style="margin:0;">Dashboard</h2>
                <span id="user_display" style="font-weight: bold;">User</span>
            </div>

            <!-- Page: Admission -->
            <div id="p-admission" class="page" style="display:none;">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h3 style="margin:0;">Enrollment & Editing</h3>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="a_search_id" placeholder="ID to Search/Edit..." style="width: 150px; margin:0;">
                            <button onclick="searchAdmission()" class="btn btn-primary" style="padding: 10px;"><i class="fas fa-search"></i></button>
                            <button onclick="resetAdmissionUI()" class="btn btn-gold" style="padding: 10px;"><i class="fas fa-rotate"></i></button>
                        </div>
                    </div>
                    <div class="grid">
                        <div><label>Application ID*</label><input type="text" id="a_id"></div>
                        <div><label>Full Name*</label><input type="text" id="a_name"></div>
                        <div><label>National ID*</label><input type="text" id="a_nid" maxlength="14"></div>
                        <div><label>Faculty*</label>
                            <select id="a_fac">
                                <option>Faculty of Arts and Design</option>
                                <option>Faculty of Business and Economics</option>
                                <option>Faculty of Computer Science & Information Technology</option>
                                <option>Faculty of Dentistry</option>
                                <option>Faculty of Engineering</option>
                                <option>Faculty of Mass Communication</option>
                                <option>Faculty of Medicine</option>
                                <option>Faculty of Pharmacy</option>
                                <option>Faculty of Physical Therapy</option>                            
                            </select>
                        </div>
                        <div><label>Email Address*</label><input type="email" id="a_mail"></div>
                        <div><label>Phone Number</label><input type="text" id="a_phone"></div>
                    </div>
                    <div style="margin-top:20px; display: flex; gap: 20px;">
                        <div style="flex: 1;">
                            <label>Student Photo</label>
                            <input type="file" id="a_file" accept="image/*" onchange="previewImage(this)">
                        </div>
                        <div class="photo-preview-container">
                            <i class="fas fa-user" id="previewPlaceholder" style="font-size: 2rem; color: #ccc;"></i>
                            <img id="a_preview_img" src="">
                        </div>
                    </div>
                    <div style="margin-top:30px; display:flex; gap:10px;">
                        <button id="btn_save_new" onclick="saveStudent()" class="btn btn-primary" style="width: 200px;"><i class="fas fa-save"></i> Save New</button>
                        <button id="btn_update_existing" onclick="updateStudent()" class="btn btn-gold" style="display:none; width: 200px;"><i class="fas fa-user-check"></i> Update Student</button>
                    </div>
                </div>
            </div>

            <!-- Page: Finance -->
            <div id="p-finance" class="page" style="display:none;">
                <div class="card">
                    <div style="display:flex; gap:10px; margin-bottom: 20px;">
                        <input type="text" id="f_search" placeholder="Search Student ID...">
                        <button onclick="search('finance')" class="btn btn-primary">Search</button>
                    </div>
                    <div id="f_res" style="display:none;">
                        <div style="display:flex; gap:20px; align-items:center;">
                            <img id="f_img" style="width:100px; height:120px; object-fit:cover; border-radius:8px; border: 1px solid #ddd;">
                            <div>
                                <h3 id="f_name_h" style="margin:0;"></h3>
                                <p id="f_fac_h" style="color:var(--gold); margin:5px 0; font-weight:bold;"></p>
                                <p id="f_email_h" style="color:#666; margin:0 0 10px 0; font-size:0.85rem;"></p>
                                <div id="f_stat_badge"></div>
                            </div>
                        </div>
                        <div class="grid" style="margin-top:20px;">
                            <div><label>Amount</label><input type="number" id="f_amt"></div>
                            <div><label>Method</label><select id="f_type"><option value="Onsite">Onsite</option><option value="Online">Online</option></select></div>
                        </div>
                        <button onclick="updatePayment()" class="btn btn-primary" style="margin-top:20px; width:100%;">Confirm Payment</button>
                    </div>
                </div>
            </div>

            <!-- Page: ID Cards -->
            <div id="p-idcard" class="page" style="display:none;">
                <div class="card">
                    <div style="display:flex; gap:10px; margin-bottom:20px;">
                        <input type="text" id="i_search" placeholder="Enter ID...">
                        <button onclick="search('id')" class="btn btn-primary">Check</button>
                    </div>
                    <div id="i_res" style="display:none; text-align:center;">
                        <img id="i_img" style="width:100px; height:120px; border-radius:8px; object-fit:cover; border: 2px solid var(--gold);">
                        <h3 id="i_name_h" style="margin:10px 0 5px 0;"></h3>
                        <p id="i_fac_h" style="color:var(--gold); margin:0; font-weight:bold;"></p>
                        <p id="i_email_h" style="color:#666; margin:5px 0 15px 0; font-size:0.85rem;"></p>
                        
                        <div style="display:flex; gap:10px; justify-content:center; margin-bottom:20px;">
                            <div class="stat-box"><span>Payment</span><b id="i_s_pay"></b></div>
                            <div class="stat-box"><span>Printed</span><b id="i_s_prn"></b></div>
                            <div class="stat-box"><span>Deliv</span><b id="i_s_del"></b></div>
                        </div>
                        <button onclick="updateID('Printed')" class="btn btn-gold" style="width:100%; margin-bottom:10px;">Mark Printed</button>
                        <button onclick="updateID('Delivered')" class="btn btn-primary" style="width:100%;">Mark Delivered</button>
                    </div>
                </div>
            </div>

            <!-- Page: Reports -->
            <div id="p-reports" class="page" style="display:none;">
                <div class="grid">
                    <div class="card" style="text-align:center;"><span>Total</span><h2 id="st_total">0</h2></div>
                    <div class="card" style="text-align:center; border-top-color:#10b981;"><span>Paid</span><h2 id="st_paid">0</h2></div>
                    <div class="card" style="text-align:center; border-top-color:#ef4444;"><span>Unpaid</span><h2 id="st_unp">0</h2></div>
                </div>
                <div class="card"><canvas id="statsChart" style="height:300px;"></canvas></div>
                <button onclick="exportData('All')" class="btn btn-primary">Export Full Database (Excel)</button>
            </div>
        </main>
        <footer>© 2026 University of East Capital | All Rights Reserved</footer>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbwadOthwImhldvCRp_-IRoXA-3PX79HMLksAg-N04ZCyEyJAzi8RAIz0MIC3NgsHvDd/exec';
        let currentStudent = null;

        function showLoader(s) { document.getElementById('loader').style.display = s ? 'block' : 'none'; }

        window.onload = () => {
            const s = JSON.parse(localStorage.getItem('uec_s'));
            if(s) { 
                document.getElementById('loginSection').style.display='none'; 
                document.getElementById('appSection').style.display='block'; 
                document.getElementById('user_display').innerText = s.user;
                applyRole(s.role);
            }
        };

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'login', username:u, password:p}) });
            const d = await res.json();
            showLoader(false);
            if(d.success) { localStorage.setItem('uec_s', JSON.stringify(d)); location.reload(); }
            else alert('Invalid Login Credentials');
        }

        function logout() { localStorage.removeItem('uec_s'); location.reload(); }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg=>pg.style.display='none');
            document.querySelectorAll('.nav-item').forEach(nv=>nv.classList.remove('active'));
            document.getElementById('p-'+p).style.display='block';
            document.getElementById('pageTitle').innerText = p.charAt(0).toUpperCase() + p.slice(1);
            if(p==='reports') loadStats();
        }

        function applyRole(role) {
            const navs = ['n-adm','n-fin','n-id','n-rep'];
            navs.forEach(n => document.getElementById(n).style.display='none');
            if(role==='Admin') navs.forEach(n => document.getElementById(n).style.display='flex');
            else document.getElementById('n-'+role.toLowerCase().substring(0,3)).style.display='flex';
            showPage(role==='Admin'?'reports':role.toLowerCase());
        }

        function previewImage(input) {
            const preview = document.getElementById('a_preview_img');
            const placeholder = document.getElementById('previewPlaceholder');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; placeholder.style.display = 'none'; }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function searchAdmission() {
            const id = document.getElementById('a_search_id').value;
            if(!id) return alert('Please enter an ID');
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getStudent', id:id}) });
            const d = await res.json();
            showLoader(false);
            if(!d.success) return alert('Student not found');
            
            document.getElementById('a_id').value = id;
            document.getElementById('a_id').disabled = true;
            document.getElementById('a_name').value = d.name;
            document.getElementById('a_nid').value = d.nid || '';
            document.getElementById('a_fac').value = d.faculty;
            document.getElementById('a_mail').value = d.email;
            document.getElementById('a_phone').value = d.phone;
            document.getElementById('a_preview_img').src = d.photo;
            document.getElementById('a_preview_img').style.display = 'block';
            document.getElementById('previewPlaceholder').style.display = 'none';
            document.getElementById('btn_save_new').style.display = 'none';
            document.getElementById('btn_update_existing').style.display = 'flex';
        }

        async function updateStudent() {
            const id = document.getElementById('a_id').value;
            const fileInput = document.getElementById('a_file');
            showLoader(true);
            const params = {
                action: 'updateStudentData', id: id,
                name: document.getElementById('a_name').value,
                nid: document.getElementById('a_nid').value,
                faculty: document.getElementById('a_fac').value,
                phone: document.getElementById('a_phone').value,
                email: document.getElementById('a_mail').value
            };
            if (fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = async () => {
                    params.fileData = reader.result.split(',')[1];
                    params.filename = id + ".jpg";
                    const r = await fetch(API, { method: 'POST', body: new URLSearchParams(params) });
                    const resJson = await r.json();
                    showLoader(false); alert(resJson.message); resetAdmissionUI();
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                const r = await fetch(API, { method: 'POST', body: new URLSearchParams(params) });
                const resJson = await r.json();
                showLoader(false); alert(resJson.message); resetAdmissionUI();
            }
        }

        function resetAdmissionUI() {
            document.getElementById('a_id').disabled = false;
            document.getElementById('btn_save_new').style.display = 'flex';
            document.getElementById('btn_update_existing').style.display = 'none';
            ['a_id','a_name','a_nid','a_mail','a_phone','a_file','a_search_id'].forEach(i=>document.getElementById(i).value='');
            document.getElementById('a_preview_img').style.display='none';
            document.getElementById('previewPlaceholder').style.display='block';
        }

        async function saveStudent() {
            const id = document.getElementById('a_id').value;
            const fileInput = document.getElementById('a_file');
            if(!id || fileInput.files.length === 0) return alert('ID and Student Photo are mandatory');
            showLoader(true);
            const reader = new FileReader();
            reader.onload = async () => {
                const res = await fetch(API, { method: 'POST', body: new URLSearchParams({
                    action: 'addStudentWithPhoto', id: id,
                    name: document.getElementById('a_name').value,
                    nid: document.getElementById('a_nid').value,
                    faculty: document.getElementById('a_fac').value,
                    phone: document.getElementById('a_phone').value,
                    email: document.getElementById('a_mail').value,
                    filename: id + ".jpg", fileData: reader.result.split(',')[1]
                })});
                const d = await res.json();
                showLoader(false); alert(d.message); if(d.success) resetAdmissionUI();
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        async function search(type) {
            const idInput = document.getElementById(type==='finance'?'f_search':'i_search');
            if(!idInput.value) return alert('Enter Student ID');
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getStudent', id:idInput.value}) });
            const d = await res.json();
            showLoader(false);
            if(!d.success) return alert('Student not found');
            currentStudent = d; currentStudent.id = idInput.value;

            if(type==='finance') {
                document.getElementById('f_res').style.display='block';
                document.getElementById('f_img').src = d.photo;
                document.getElementById('f_name_h').innerText = d.name;
                document.getElementById('f_fac_h').innerText = d.faculty; // عرض الكلية
                document.getElementById('f_email_h').innerText = d.email;   // عرض الإيميل
                const badge = document.getElementById('f_stat_badge');
                badge.innerText = d.status === 'Paid' ? 'PAID' : 'UNPAID';
                badge.style.background = d.status === 'Paid' ? '#10b981' : '#ef4444';
                badge.className = 'status-badge';
            } else {
                document.getElementById('i_res').style.display='block';
                document.getElementById('i_img').src = d.photo;
                document.getElementById('i_name_h').innerText = d.name;     // عرض الاسم
                document.getElementById('i_fac_h').innerText = d.faculty;   // عرض الكلية
                document.getElementById('i_email_h').innerText = d.email;   // عرض الإيميل
                document.getElementById('i_s_pay').innerText = d.status;
                document.getElementById('i_s_prn').innerText = d.printed;
                document.getElementById('i_s_del').innerText = d.delivered;
            }
        }

        async function updatePayment() {
            if(!document.getElementById('f_amt').value) return alert('Enter amount');
            showLoader(true);
            await fetch(API, { method: 'POST', body: new URLSearchParams({
                action: 'updatePayment', id: currentStudent.id, amount: document.getElementById('f_amt').value,
                status: 'Paid', type: document.getElementById('f_type').value
            })});
            showLoader(false); alert('Payment Confirmed'); search('finance');
        }

        async function updateID(field) {
            showLoader(true);
            await fetch(API, { method: 'POST', body: new URLSearchParams({action:'updateIDStatus', id:currentStudent.id, field:field}) });
            showLoader(false); alert('ID Status Updated'); search('id');
        }

        async function loadStats() {
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getStats'}) });
            const d = await res.json();
            document.getElementById('st_total').innerText = d.registered;
            document.getElementById('st_paid').innerText = d.paid;
            document.getElementById('st_unp').innerText = d.unpaid;
        }

        async function exportData(f) {
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getFilteredData', filter:f}) });
            const d = await res.json();
            showLoader(false);
            const ws = XLSX.utils.aoa_to_sheet(d.data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Students_Report");
            XLSX.writeFile(wb, "UEC_Database_Report.xlsx");
        }
    </script>
</body>
</html>
