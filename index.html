<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEC Management | Professional Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary: #0a192f;
            --secondary: #172a45;
            --accent: #64ffda;
            --gold: #C5A059;
            --text-main: #ccd6f6;
            --text-dim: #8892b0;
            --white: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: var(--primary);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Sidebar Architecture */
        .sidebar {
            width: 280px;
            background: var(--secondary);
            height: 100vh;
            position: fixed;
            box-shadow: 10px 0 30px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .brand {
            padding: 40px 20px;
            text-align: center;
        }

        .brand h2 {
            color: var(--gold);
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
        }

        .nav-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .nav-item {
            padding: 18px 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-dim);
            border-left: 4px solid transparent;
        }

        .nav-item i { font-size: 1.2rem; }

        .nav-item:hover, .nav-item.active {
            color: var(--gold);
            background: rgba(197, 160, 89, 0.1);
            border-left-color: var(--gold);
        }

        /* Main Workspace */
        .main {
            margin-left: 280px;
            padding: 50px;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--white);
            border-radius: 20px;
            padding: 40px;
            color: #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        h3 { color: var(--primary); margin-top: 0; font-weight: 700; border-right: 5px solid var(--gold); padding-right: 15px; }

        /* Input Styles */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        .form-control { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #555; }
        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-family: inherit;
            transition: 0.3s;
        }
        input:focus { border-color: var(--gold); outline: none; }

        /* Buttons */
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gold { background: var(--gold); color: white; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* Login Screen */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, var(--secondary) 0%, var(--primary) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .login-card { width: 400px; text-align: center; }

        /* Stats Section */
        .stat-box {
            padding: 25px;
            border-radius: 15px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-box h2 { font-size: 2.5rem; margin: 10px 0; }

        /* Result View */
        .result-profile {
            display: flex;
            gap: 30px;
            align-items: center;
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
        }
        .profile-img { width: 120px; height: 140px; border-radius: 10px; object-fit: cover; border: 3px solid var(--gold); }

        /* Loader */
        .loader {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--gold);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2000;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        @media (max-width: 992px) {
            .sidebar { width: 80px; }
            .sidebar h2, .nav-item span { display: none; }
            .main { margin-left: 80px; }
        }
    </style>
</head>
<body>

    <div id="loader" class="loader"><i class="fas fa-satellite-dish"></i> Syncing Data...</div>

    <div id="loginSection" class="login-overlay">
        <div class="glass-card login-card">
            <h1 style="color:var(--primary); margin-bottom:10px;">UEC</h1>
            <p style="color:var(--text-dim); margin-bottom:30px;">Authorized Access Only</p>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()" class="btn btn-primary" style="width:100%; margin-top:20px;">
                Sign In <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="appSection" style="display:none;">
        <aside class="sidebar">
            <div class="brand"><h2>East Capital</h2></div>
            <ul class="nav-list">
                <li id="n-adm" class="nav-item" onclick="showPage('admission')"><i class="fas fa-user-plus"></i> <span>Admission</span></li>
                <li id="n-fin" class="nav-item" onclick="showPage('finance')"><i class="fas fa-coins"></i> <span>Finance</span></li>
                <li id="n-id" class="nav-item" onclick="showPage('idcard')"><i class="fas fa-id-badge"></i> <span>ID Cards</span></li>
                <li id="n-rep" class="nav-item" onclick="showPage('reports')"><i class="fas fa-analytics"></i> <span>Reports</span></li>
                <li class="nav-item" onclick="logout()" style="margin-top:100px;"><i class="fas fa-power-off"></i> <span>Logout</span></li>
            </ul>
        </aside>

        <main class="main">
            <div id="p-admission" class="page" style="display:none;">
                <div class="glass-card">
                    <h3>Enroll New Student</h3>
                    <div class="grid">
                        <div class="form-control"><label>ID Number</label><input type="text" id="a_id"></div>
                        <div class="form-control"><label>Full Name</label><input type="text" id="a_name"></div>
                        <div class="form-control"><label>Faculty</label>
                            <select id="a_fac"><option>Faculty of Computing</option><option>Faculty of Engineering</option><option>Business School</option></select>
                        </div>
                        <div class="form-control"><label>Phone</label><input type="text" id="a_phone"></div>
                        <div class="form-control"><label>Email</label><input type="email" id="a_mail"></div>
                        <div class="form-control"><label>Photo URL</label><input type="text" id="a_photo"></div>
                    </div>
                    <div style="margin-top:30px; display:flex; gap:15px;">
                        <button onclick="saveStudent()" class="btn btn-primary"><i class="fas fa-save"></i> Save Record</button>
                        <button onclick="clearAdmission()" class="btn btn-gold">New Entry</button>
                    </div>
                </div>
            </div>

            <div id="p-finance" class="page" style="display:none;">
                <div class="glass-card">
                    <h3>Financial Verification</h3>
                    <div style="display:flex; gap:15px; margin-bottom:30px;">
                        <input type="text" id="f_search" placeholder="Search by Student ID...">
                        <button onclick="search('finance')" class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
                    </div>

                    <div id="f_res" style="display:none;">
                        <div class="result-profile">
                            <img id="f_img" class="profile-img">
                            <div>
                                <h2 id="f_name_h" style="margin:0; color:var(--primary);"></h2>
                                <p id="f_info_h" style="font-weight:600; color:var(--gold);"></p>
                                <p id="f_contact_h"></p>
                            </div>
                        </div>
                        <div class="grid" style="margin-top:30px;">
                            <div class="form-control"><label>Amount (EGP)</label><input type="number" id="f_amt"></div>
                            <div class="form-control"><label>Status</label><select id="f_status"><option value="Paid">Paid</option><option value="Pending">Pending</option></select></div>
                            <div class="form-control"><label>Method</label><select id="f_type" onchange="toggleOnlineBtn()"><option value="Onsite">Cash Onsite</option><option value="Online">Online Transfer</option></select></div>
                        </div>
                        <div style="display:flex; gap:15px;">
                            <button onclick="updatePayment()" class="btn btn-primary" style="flex:2;">Confirm Payment</button>
                            <button id="btn_notify" onclick="sendOnlineEmail()" class="btn btn-gold" style="display:none; flex:1;"><i class="fas fa-paper-plane"></i> Notify Admission</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="p-idcard" class="page" style="display:none;">
                <div class="glass-card">
                    <h3>ID Management</h3>
                    <div style="display:flex; gap:15px; margin-bottom:30px;">
                        <input type="text" id="i_search" placeholder="Enter Student ID...">
                        <button onclick="search('id')" class="btn btn-primary">Check Status</button>
                    </div>
                    <div id="i_res" style="display:none; text-align:center;">
                        <div class="result-profile" style="justify-content:center;">
                            <img id="i_img" class="profile-img">
                            <div style="text-align:left">
                                <h2 id="i_name_h"></h2>
                                <p id="i_stat_h" style="font-weight:bold"></p>
                            </div>
                        </div>
                        <div style="margin-top:30px; display:flex; justify-content:center; gap:20px;">
                            <button onclick="updateID('Printed')" class="btn btn-gold">Mark as Printed</button>
                            <button onclick="updateID('Delivered')" class="btn btn-primary">Mark as Delivered</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="p-reports" class="page" style="display:none;">
                <div class="grid">
                    <div class="stat-box" style="background:var(--primary)"><span>Registered</span><h2 id="st_reg">0</h2></div>
                    <div class="stat-box" style="background:#10b981"><span>Total Paid</span><h2 id="st_paid">0</h2></div>
                    <div class="stat-box" style="background:#f43f5e"><span>Unpaid</span><h2 id="st_unp">0</h2></div>
                    <div class="stat-box" style="background:var(--gold)"><span>ID Issued</span><h2 id="st_prn">0</h2></div>
                </div>
                <div class="glass-card" style="margin-top:30px;">
                    <canvas id="statsChart" height="120"></canvas>
                    <div style="margin-top:30px; border-top:1px solid #eee; padding-top:20px;">
                        <button onclick="exportToExcel()" class="btn btn-gold"><i class="fas fa-download"></i> Export Student Database (Excel)</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycby1sE3AC0hkGgGLu2cbeo1Y72IuerKIeobZGKBIlzg3Ut4k7qHK5fEL13NPeSCdZGqdbA/exec';

        function showLoader(s) { document.getElementById('loader').style.display = s ? 'block' : 'none'; }

        // Session Control
        window.onload = () => {
            const session = JSON.parse(localStorage.getItem('uec_session'));
            if(session) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('appSection').style.display = 'block';
                applyRole(session.role);
            }
        };

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'login', username:u, password:p}) });
            const data = await res.json();
            showLoader(false);
            if(data.success) {
                localStorage.setItem('uec_session', JSON.stringify(data));
                location.reload();
            } else alert('Access Denied: Invalid Credentials');
        }

        function logout() { localStorage.removeItem('uec_session'); location.reload(); }

        function applyRole(role) {
            const navs = ['n-adm', 'n-fin', 'n-id', 'n-rep'];
            navs.forEach(n => document.getElementById(n).style.display = 'none');
            if(role === 'Admin') navs.forEach(n => document.getElementById(n).style.display = 'flex');
            else document.getElementById('n-' + role.toLowerCase().substring(0,3)).style.display = 'flex';
            showPage(role === 'Admin' ? 'reports' : role.toLowerCase());
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('p-' + p).style.display = 'block';
            if(p === 'reports') loadStats();
        }

        // Logic Functions
        async function saveStudent() {
            showLoader(true);
            const params = {
                action: 'addStudent',
                id: document.getElementById('a_id').value,
                name: document.getElementById('a_name').value,
                faculty: document.getElementById('a_fac').value,
                phone: document.getElementById('a_phone').value,
                email: document.getElementById('a_mail').value,
                photo: document.getElementById('a_photo').value
            };
            await fetch(API, { method: 'POST', body: new URLSearchParams(params) });
            showLoader(false);
            alert('Record Saved Successfully!');
        }

        async function search(type) {
            const id = document.getElementById(type === 'finance' ? 'f_search' : 'i_search').value;
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getStudent', id:id}) });
            const d = await res.json();
            showLoader(false);
            if(!d.success) return alert('Student ID Not Found');

            if(type === 'finance') {
                document.getElementById('f_res').style.display = 'block';
                document.getElementById('f_img').src = d.photo;
                document.getElementById('f_name_h').innerText = d.name;
                document.getElementById('f_info_h').innerText = d.faculty;
                document.getElementById('f_contact_h').innerText = `${d.phone} | ${d.email}`;
                document.getElementById('f_amt').value = d.amount;
            } else {
                document.getElementById('i_res').style.display = 'block';
                document.getElementById('i_img').src = d.photo;
                document.getElementById('i_name_h').innerText = d.name;
                document.getElementById('i_stat_h').innerText = `Status: ${d.status} | Printed: ${d.printed}`;
                document.getElementById('i_stat_h').style.color = d.status === 'Paid' ? '#10b981' : '#f43f5e';
            }
        }

        function toggleOnlineBtn() {
            const val = document.getElementById('f_type').value;
            document.getElementById('btn_notify').style.display = (val === 'Online') ? 'block' : 'none';
        }

        async function updatePayment() {
            showLoader(true);
            const params = {
                action: 'updatePayment',
                id: document.getElementById('f_search').value,
                amount: document.getElementById('f_amt').value,
                status: document.getElementById('f_status').value,
                type: document.getElementById('f_type').value
            };
            await fetch(API, { method: 'POST', body: new URLSearchParams(params) });
            showLoader(false);
            alert('Financial Record Updated');
        }

        async function updateID(field) {
            showLoader(true);
            await fetch(API, { method: 'POST', body: new URLSearchParams({action:'updateIDStatus', id:document.getElementById('i_search').value, field:field}) });
            showLoader(false);
            alert('ID Status Updated');
            search('id');
        }

        async function loadStats() {
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getStats'}) });
            const d = await res.json();
            document.getElementById('st_reg').innerText = d.registered;
            document.getElementById('st_paid').innerText = d.paid;
            document.getElementById('st_unp').innerText = d.unpaid;
            document.getElementById('st_prn').innerText = d.printed;
            
            new Chart(document.getElementById('statsChart'), {
                type: 'bar',
                data: {
                    labels: ['Registered', 'Paid', 'Printed', 'Delivered'],
                    datasets: [{ label: 'Overall Statistics', data: [d.registered, d.paid, d.printed, d.delivered], backgroundColor: ['#0a192f','#10b981','#C5A059','#3b82f6'] }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }

        async function exportToExcel() {
            showLoader(true);
            const res = await fetch(API, { method: 'POST', body: new URLSearchParams({action:'getAllData'}) });
            const d = await res.json();
            showLoader(false);
            
            const ws = XLSX.utils.aoa_to_sheet(d.data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Students");
            XLSX.writeFile(wb, "UEC_Students_Report.xlsx");
        }

        function clearAdmission() {
            ['a_id','a_name','a_phone','a_mail','a_photo'].forEach(i => document.getElementById(i).value = '');
        }
    </script>
</body>
</html>
