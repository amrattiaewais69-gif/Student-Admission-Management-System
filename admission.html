<div class="page-header"><h2>Student Registration</h2></div>
<form id="admissionForm" class="card">
  <div class="grid">
    <input type="text" id="s_id" placeholder="Student ID" required>
    <input type="text" id="s_name" placeholder="Full Name" required>
    <select id="s_faculty">
      <option>Engineering</option>
      <option>Medicine</option>
      <option>Business</option>
    </select>
    <input type="text" id="s_phone" placeholder="Phone">
    <input type="email" id="s_email" placeholder="Email">
    <input type="text" id="s_nid" placeholder="National ID">
    <input type="text" id="s_photo" placeholder="Photo URL">
  </div>
  <button type="button" onclick="submitAdmission()" class="btn-primary">Register Student</button>
</form>
